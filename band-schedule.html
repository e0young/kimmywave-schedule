<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>합주 일정 조율</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#ffffff; --bg2:#f8f8f6; --bg3:#f0efea;
      --text:#1c1c1a; --text2:#6b6b66; --text3:#a0a09a;
      --border:#e4e4de; --border2:#d0d0c8;
      --r:10px; --rs:6px;
    }
    body { font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif; background:var(--bg2); color:var(--text); min-height:100vh; display:flex; justify-content:center; padding:1.5rem 1rem 3rem; }
    #app { width:100%; max-width:500px; }
    button { font-family:inherit; cursor:pointer; border:0.5px solid var(--border2); background:var(--bg); color:var(--text); border-radius:var(--rs); padding:6px 14px; font-size:13px; transition:background .12s; }
    button:hover { background:var(--bg3); }
    button:active { transform:scale(0.98); }

    .live-badge { display:inline-flex; align-items:center; gap:5px; font-size:11px; color:#3b6d11; background:#eaf3de; padding:3px 8px; border-radius:99px; }
    .live-dot { width:6px; height:6px; border-radius:50%; background:#3b6d11; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .avatar { border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:600; flex-shrink:0; }
    .card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--r); padding:12px 14px; margin-bottom:10px; }
    .card-title { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:8px; }

    /* ── 공통 달력 ── */
    .month-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .month-label { font-size:15px; font-weight:600; }
    .dow-row { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:4px; }
    .dow-cell { text-align:center; font-size:11px; padding:3px 0; color:var(--text2); }
    .dow-cell.sun { color:#e24b4a; } .dow-cell.sat { color:#378add; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:.75rem; }

    /* ── 날짜 셀 ── */
    .day-cell { border:0.5px solid var(--border); border-radius:var(--rs); overflow:hidden; display:flex; flex-direction:column; min-height:74px; }
    .day-cell.today { outline:2px solid #378add; outline-offset:1px; }
    .day-cell.selected { outline:2px solid #7F77DD; outline-offset:1px; }
    .day-header { padding:3px 4px 2px; border-bottom:0.5px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .day-num { font-size:11px; font-weight:400; color:var(--text); }
    .day-num.bold { font-weight:700; } .day-num.sun { color:#e24b4a; } .day-num.sat { color:#378add; }
    .slot { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2px; position:relative; }
    .slot.clickable { cursor:pointer; transition:background .1s; }
    .slot.clickable:hover { filter:brightness(0.93); }
    .slot:first-of-type { border-bottom:0.5px solid var(--border); }
    .slot.unavail { background:#fef0f0; }
    .slot-label { font-size:9px; color:var(--text3); line-height:1; margin-bottom:2px; }
    .slot.unavail .slot-label { color:#a32d2d; font-weight:700; }
    .dot-row { display:flex; gap:2px; flex-wrap:wrap; justify-content:center; }
    .dot { width:4px; height:4px; border-radius:50%; flex-shrink:0; }
    .grade-pip { position:absolute; top:2px; right:2px; width:5px; height:5px; border-radius:50%; }
    .grade-pip.perfect { background:#3b6d11; } .grade-pip.good { background:#639922; } .grade-pip.okay { background:#BA7517; }

    /* ── 날짜 상세 패널 ── */
    .day-detail { background:var(--bg); border:0.5px solid #7F77DD44; border-radius:var(--r); padding:12px 14px; margin-bottom:10px; }
    .detail-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .detail-title { font-size:14px; font-weight:600; }
    .detail-close { font-size:18px; color:var(--text3); cursor:pointer; background:none; border:none; padding:0 4px; line-height:1; }
    .detail-close:hover { color:var(--text); background:none; }
    .detail-slots { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .detail-slot-title { font-size:12px; font-weight:600; margin-bottom:6px; color:var(--text2); }
    .member-chips { display:flex; flex-wrap:wrap; gap:4px; min-height:20px; }
    .chip { display:inline-flex; align-items:center; gap:4px; padding:2px 7px; border-radius:99px; font-size:11px; }
    .chip-x { background:#fef0f0; color:#a32d2d; border:0.5px solid #f09595; }
    .chip-none { background:var(--bg3); color:var(--text3); border:0.5px solid var(--border); }
    .chip-ok { background:#eaf3de; color:#3b6d11; border:0.5px solid #97C459; }
    .chip-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .detail-label { font-size:10px; color:var(--text3); margin-bottom:3px; }
    .all-ok-msg { font-size:12px; color:#3b6d11; }

    /* ── 로그인 멤버 선택 ── */
    .login-section-title { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:8px; }
    .member-grid4 { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:1rem; }
    .member-btn4 { display:flex; flex-direction:column; align-items:center; gap:5px; padding:10px 4px; border-radius:var(--r); border:0.5px solid var(--border); background:var(--bg); cursor:pointer; transition:background .12s, transform .1s; }
    .member-btn4:hover { background:var(--bg3); transform:translateY(-1px); }
    .member-btn4 .m-name { font-size:11px; color:var(--text); text-align:center; line-height:1.3; }
    .member-btn4 .m-status { font-size:9px; color:var(--text3); }
    .member-btn4.done-btn .m-status { color:#3b6d11; }

    /* ── 상단 바 (캘린더 모드) ── */
    .top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; }
    .user-badge { display:flex; align-items:center; gap:8px; }
    .user-name { font-size:15px; font-weight:600; }

    /* ── 제출 버튼 ── */
    .submit-btn { width:100%; padding:12px; font-size:14px; font-weight:600; border-radius:var(--r); cursor:pointer; transition:background .15s; border:1.5px solid #639922; color:#3b6d11; background:#eaf3de; }
    .submit-btn:hover { background:#d4ecc0; }
    .submit-btn.submitted { border-color:#3b6d11; background:#3b6d11; color:white; }
    .submit-btn.submitted:hover { background:#2d5a0d; }
    .submit-hint { font-size:11px; color:var(--text3); text-align:center; margin-top:5px; margin-bottom:10px; }

    /* ── 요약 ── */
    .summary-title { font-size:13px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
    .grade-badge { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .summary-row { display:flex; gap:8px; font-size:12px; margin-bottom:4px; align-items:flex-start; }
    .slot-tag { font-size:10px; background:var(--bg3); padding:1px 6px; border-radius:3px; color:var(--text2); flex-shrink:0; margin-top:1px; }
    .days { color:var(--text); line-height:1.5; }
    .summary-none { font-size:12px; color:var(--text3); }
    .waiting-count { font-size:22px; font-weight:700; color:var(--text); display:block; margin-bottom:4px; }

    /* ── 응답 현황 ── */
    .status-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
    .status-row { display:flex; align-items:center; gap:6px; font-size:11px; }
    .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

    .legend { display:flex; gap:10px; flex-wrap:wrap; font-size:11px; color:var(--text2); margin-bottom:10px; }
    .legend-item { display:flex; align-items:center; gap:4px; }
    .legend-dot { width:8px; height:8px; border-radius:50%; }
    .hint { font-size:11px; color:var(--text3); text-align:center; line-height:1.7; margin-top:4px; }
    .loading { text-align:center; padding:3rem; color:var(--text2); font-size:14px; }
    .error-msg { text-align:center; padding:2rem; color:#a32d2d; font-size:13px; }

    /* ── 순서 버튼 ── */
    .order-btns { display:flex; flex-direction:column; gap:1px; flex-shrink:0; }
    .order-btn { background:none; border:none; color:var(--text3); font-size:11px; padding:1px 4px; cursor:pointer; line-height:1; border-radius:3px; }
    .order-btn:hover { background:var(--bg3); color:var(--text); }
    .order-btn:disabled { opacity:0.2; cursor:default; }
    .encore-divider { display:flex; align-items:center; gap:10px; padding:8px 0; }
    .encore-divider span { font-size:11px; font-weight:600; color:#7F77DD; letter-spacing:.1em; white-space:nowrap; }
    .encore-line { flex:1; height:0.5px; background:#7F77DD55; }
    /* ── 탭 ── */
    .tab-bar { display:flex; border-bottom:0.5px solid var(--border); margin-bottom:1rem; }
    .tab-btn { padding:8px 20px; font-size:14px; font-weight:500; cursor:pointer; color:var(--text2); border-bottom:2px solid transparent; background:none; border-left:none; border-right:none; border-top:none; border-radius:0; }
    .tab-btn.active { color:#7F77DD; border-bottom:2px solid #7F77DD; }
    .tab-btn:hover { background:var(--bg3); }
    /* ── 셋리스트 ── */
    .song-list { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--r); padding:4px 12px; }
    .song-row { display:flex; align-items:center; padding:9px 0; border-bottom:0.5px solid var(--border); gap:8px; cursor:pointer; }
    .song-row:last-child { border-bottom:none; }
    .song-num { font-size:11px; color:var(--text3); width:16px; flex-shrink:0; text-align:right; }
    .song-info { flex:1; min-width:0; }
    .song-title { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .song-meta { font-size:10px; color:var(--text3); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .song-right { display:flex; align-items:center; gap:5px; flex-shrink:0; }
    .note-badge { font-size:10px; color:var(--text2); background:var(--bg3); padding:1px 6px; border-radius:3px; }
    .yt-dot { width:7px; height:7px; border-radius:50%; background:#E24B4A; flex-shrink:0; }
    .song-detail { background:var(--bg2); border-radius:8px; padding:8px 10px; margin:4px 0 6px 24px; }
    .detail-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
    .detail-row:last-child { margin-bottom:0; }
    .detail-label { font-size:10px; color:var(--text3); width:46px; flex-shrink:0; }
    .s-chips { display:flex; flex-wrap:wrap; gap:3px; }
    .s-chip { font-size:10px; padding:1px 6px; border-radius:99px; }
    .s-chip-o   { background:#eaf3de; color:#27500A; border:0.5px solid #97C459; }
    .s-chip-cho { background:#E6F1FB; color:#0C447C; border:0.5px solid #85B7EB; }
    .s-chip-x   { background:var(--bg3); color:var(--text3); border:0.5px solid var(--border); text-decoration:line-through; }
    .s-chip-etc { background:#FAEEDA; color:#633806; border:0.5px solid #EF9F27; }
    .yt-btn { display:inline-flex; align-items:center; gap:4px; font-size:10px; color:#E24B4A; background:#FCEBEB; border:0.5px solid #F09595; border-radius:4px; padding:2px 8px; margin-top:5px; text-decoration:none; cursor:pointer; }
  </style>
</head>

const GRADE_COLOR = { perfect:'#3b6d11', good:'#639922', okay:'#BA7517' };
const DOW_KR = ['일','월','화','수','목','금','토'];

function calcGrade(availSet) {
  const hasVocal   = ['보컬(박)','보컬(이)'].some(m => availSet.has(m));
  const hasDrum    = ['드럼(의)','드럼(현)'].some(m => availSet.has(m));
  const hasGuitarS = availSet.has('기타(손)');
  const hasKeybd   = availSet.has('건반');
  const hasGuitarB = availSet.has('기타(배)');
  const hasBass    = availSet.has('베이스');
  if (!hasGuitarS || !hasKeybd) return 'none';
  if (!hasGuitarB && !hasBass) return 'none';
  if (!hasVocal || !hasDrum) return 'none';
  if (availSet.size === MEMBERS.length && allDone()) return 'perfect';
  if (hasGuitarB && hasBass) return 'good';
  return 'okay';
}

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


/* ── 셋리스트 데이터 ── */
const SETLIST = [
  { num:1, title:'크라잉넛 - 밤이 깊었네', note:'Orig. Key',

  { num:6, title:'자우림 - 팬이야', note:'Orig. Key',
    parts:{ Vocal:['박윤미(Chorus)','이성현(O)'], Guitar:['손종현(O)','배상호(O)'], Bass:['박종원(O)'], Keyboard:['박정애(O)'], Drum:['김의영(O)'] } },
  { num:7, title:'자우림 - 2521', note:'Orig. Key (25주년)', link:'https://youtu.be/BteNIPEAB90?si=tni3KKbhsUvlN9q9',
    parts:{ Vocal:['박윤미(Chorus)','이성현(O)'], Guitar:['손종현(O)','배상호(O)'], Bass:['박종원(O)'], Keyboard:['박정애(O)'], Drum:['김의영(O)'] } },

    parts:{ Vocal:['박윤미(Chorus)','이성현(O)'], Guitar:['손종현(O)','배상호(O)'], Bass:['박종원(O)'], Keyboard:['박정애(O)'], Drum:['김현창(O)'] } },
  { num:99, title:'__ENCORE__', note:'', parts:{} },
];

function chipClass(s) {
  if (s.includes('(X)'))      return 's-chip s-chip-x';
  if (s.includes('(Chorus)')) return 's-chip s-chip-cho';
  if (s.includes('(O)'))      return 's-chip s-chip-o';
  return 's-chip s-chip-etc';
}
function chipLabel(s) {
  if (s.includes('(BeatBox)')) return s.replace('(BeatBox)','').trim() + '(BB)';
  return s.replace('(O)','').replace('(X)','').replace('(Chorus)','').trim();
}

/* ── 셋리스트 순서 관리 ── */
function getOrderedSetlist() {
  if (!state.setlistOrder) return SETLIST;
  const ordered = state.setlistOrder.map(num => SETLIST.find(s => s.num === num)).filter(Boolean);
  const missing = SETLIST.filter(s => !state.setlistOrder.includes(s.num));
  return [...ordered, ...missing];
}


function moveSong(idx, dir) {
  const ordered = getOrderedSetlist();
  const newOrder = ordered.map(s => s.num);
  const target = idx + dir;
  if (target < 0 || target >= newOrder.length) return;
  [newOrder[idx], newOrder[target]] = [newOrder[target], newOrder[idx]];
  state.setlistOrder = newOrder;
  saveSetlistOrder();
  render();
}

function saveSetlistOrder() {
  const order = getOrderedSetlist().map(s => s.num);
  db.ref('setlist_order').set(order);
}

function loadSetlistOrder() {
  db.ref('setlist_order').on('value', snap => {
    const val = snap.val();
    if (val && Array.isArray(val)) state.setlistOrder = val;
    else state.setlistOrder = SETLIST.map(s => s.num);
    if (state.tab === 'setlist') render();
  });
}


function renderSetlist() {
  const ordered = getOrderedSetlist();
  let songCount = 0;
  const rows = ordered.map((song, idx) => {
    if (song.title !== '__ENCORE__') songCount++;
    const displayNum = songCount;
    const isExp = state.expandedSong === song.num;
    const allParts = Object.values(song.parts).flat();
    const metaStr = allParts.map(s=>chipLabel(s)).join(' · ');

    const detailHTML = isExp ? `
      <div class="song-detail">
        ${Object.entries(song.parts).map(([part, members])=>`
          <div class="detail-row">
            <span class="detail-label">${part}</span>
            <div class="s-chips">${members.map(m=>`<span class="${chipClass(m)}">${chipLabel(m)}</span>`).join('')}</div>
          </div>`).join('')}
        ${song.link ? `<a class="yt-btn" href="${song.link}" target="_blank">▶ YouTube에서 보기</a>` : ''}
      </div>` : '';

    if (song.title === '__ENCORE__') return `
      <div class="song-item" data-num="${song.num}" data-idx="${idx}">
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="order-btns">
            <button class="order-btn" onclick="moveSong(${idx},-1)" ${idx===0?'disabled':''}>▲</button>
            <button class="order-btn" onclick="moveSong(${idx},1)" ${idx===ordered.length-1?'disabled':''}>▼</button>
          </div>
          <div class="encore-divider" style="flex:1;">
            <div class="encore-line"></div>
            <span>— 앵콜 —</span>
            <div class="encore-line"></div>
          </div>
        </div>
      </div>`;

    return `
      <div class="song-item" data-num="${song.num}" data-idx="${idx}">
        <div class="song-row">
          <div class="order-btns">
            <button class="order-btn" onclick="moveSong(${idx},-1)" ${idx===0?'disabled':''}>▲</button>
            <button class="order-btn" onclick="moveSong(${idx},1)" ${idx===ordered.length-1?'disabled':''}>▼</button>
          </div>
          <span class="song-num">${displayNum}</span>
          <div class="song-info" onclick="state.expandedSong=${isExp?'null':song.num};render();" style="cursor:pointer;">
            <div class="song-title">${song.title}</div>
            <div class="song-meta">${metaStr}</div>
          </div>
          <div class="song-right" onclick="state.expandedSong=${isExp?'null':song.num};render();" style="cursor:pointer;">
            <span class="note-badge">${song.note}</span>
            ${song.link ? '<div class="yt-dot"></div>' : ''}
          </div>
        </div>
        ${detailHTML}
      </div>`;
  }).join('');

  return `
    ${renderTabBar()}
    <div class="song-list" id="song-list">${rows}</div>
    <p class="hint" style="margin-top:8px;">▲▼ 버튼으로 순서 변경 · 빨간 점 = 유튜브 링크 있음</p>`;
}

let state = {
  member: null,
  year: new Date().getFullYear(), month: new Date().getMonth()+1,
  myData: {}, allData: {},
  listener: null, loading: true, error: null,
  selectedDay: null,
  isAdmin: false,
  tab: 'schedule',
  expandedSong: null,
  setlistOrder: null
};

function monthKey(y,m) { return `${y}-${String(m).padStart(2,'0')}`; }
function daysIn(y,m)   { return new Date(y,m,0).getDate(); }
function firstDOW(y,m) { return new Date(y,m-1,1).getDay(); }
function isDone(m)     { return state.allData[m]?.['_done'] === 'Y'; }
function allDone()     { return MEMBERS.every(m => isDone(m)); }
function doneCount()   { return MEMBERS.filter(m => isDone(m)).length; }
function canShowGrade() {
  return allDone() || (
    isDone('기타(손)') && isDone('건반') &&
    ['보컬(박)','보컬(이)'].some(m => isDone(m)) &&
    ['드럼(의)','드럼(현)'].some(m => isDone(m)) &&
    ['기타(배)','베이스'].some(m => isDone(m))
  );
}
function xCount(m)     { return Object.entries(state.allData[m]||{}).filter(([k,v])=>k!=='_done'&&v==='X').length; }

function getSlotInfo(d, slot) {
  const key = `${d}_${slot}`;
  const unavail = new Set(MEMBERS.filter(m => state.allData[m]?.[key]==='X'));
  // 제출 완료한 멤버 중 X 없는 사람만 가능으로 계산
  const avail   = new Set(MEMBERS.filter(m => isDone(m) && !unavail.has(m)));
  return { unavail, avail, grade: calcGrade(avail) };
}

function attachListener() {
  if (state.listener) { state.listener.off(); state.listener = null; }
  const ref = db.ref(`schedule/${monthKey(state.year,state.month)}`);
  const tid = setTimeout(()=>{
    if (state.loading) { state.loading=false; state.error='Firebase 연결 실패. 새로고침 해보세요.'; render(); }
  }, 8000);
  ref.on('value', snap => {
    clearTimeout(tid); state.error=null;
    const data = snap.val()||{};
    state.allData={};
    MEMBERS.forEach(m=>{ state.allData[m]=data[m]||{}; });
    state.allData['_admin'] = data['_admin']||{};
    if (state.member) state.myData={...state.allData[state.member]};
    state.loading=false; render();
  }, err=>{
    clearTimeout(tid); state.loading=false; state.error='오류: '+err.message; render();
  });
  state.listener=ref;
}

function doLogin(m)  { state.member=m; state.myData={...state.allData[m]}; state.selectedDay=null; render(); }
function doLogout()  { state.member=null; state.myData={}; state.selectedDay=null; render(); }
function doSelectDay(d) { state.selectedDay = state.selectedDay===d ? null : d; render(); }
function doAdminLogin() { state.isAdmin=true; state.selectedDay=null; render(); }
function doAdminLogout() { state.isAdmin=false; state.selectedDay=null; render(); }
function isGameDay(d, slot) { return state.allData['_admin']?.[d+'_'+slot] === 'Y'; }
function isBlocked(d, slot)  { return state.allData['_admin']?.[d+'_'+slot] === 'B'; }
function doAdminToggle(d, slot) {
  const key=d+'_'+slot;
  const ref=db.ref('schedule/'+monthKey(state.year,state.month)+'/_admin/'+key);
  const cur = state.allData['_admin']?.[key];
  if (!state.allData['_admin']) state.allData['_admin']={};
  if (!cur)      { state.allData['_admin'][key]='Y'; ref.set('Y'); }
  else if(cur==='Y') { state.allData['_admin'][key]='B'; ref.set('B'); }
  else           { delete state.allData['_admin'][key]; ref.remove(); }
  render();
}

function doToggle(d, slot) {
  const key=`${d}_${slot}`;
  const ref=db.ref(`schedule/${monthKey(state.year,state.month)}/${state.member}/${key}`);
  if (state.myData[key]==='X') { delete state.myData[key]; ref.remove(); }
  else                          { state.myData[key]='X'; ref.set('X'); }
  state.allData[state.member]={...state.myData};
  render();
}

function doSubmit() {
  const ref=db.ref(`schedule/${monthKey(state.year,state.month)}/${state.member}/_done`);
  if (isDone(state.member)) { delete state.myData['_done']; state.allData[state.member]['_done']=undefined; ref.remove(); }
  else                       { state.myData['_done']='Y'; state.allData[state.member]['_done']='Y'; ref.set('Y'); }
  render();
}

function doMonth(delta) {
  if (state.listener) { state.listener.off(); state.listener=null; }
  let {year,month}=state; month+=delta;
  if (month>12){year++;month=1;} if(month<1){year--;month=12;}
  state.year=year; state.month=month;
  state.myData={}; state.allData={}; state.loading=true; state.selectedDay=null;
  render(); attachListener();
loadSetlistOrder();
}

/* ── 달력 그리드 (공용) ── */
function renderCalGrid(editable) {
  const {year,month,member,myData} = state;
  const total=daysIn(year,month), first=firstDOW(year,month);
  const today=new Date();
  const todayD=today.getFullYear()===year&&today.getMonth()+1===month?today.getDate():-1;
  const showGrade=canShowGrade();
  const GRADE_BG={perfect:'#97c97a',good:'#dff5d0',okay:'#faeeda'};

  let cells='';
  for (let i=0;i<first;i++) cells+='<div></div>';

  for (let d=1;d<=total;d++) {
    const dow=(first+d-1)%7;
    const isToday=d===todayD;
    const isSel=state.selectedDay===d;
    const numCls=['day-num',isToday?'bold':'',dow===0?'sun':dow===6?'sat':''].filter(Boolean).join(' ');
    let cellCls='day-cell';
    if (isToday) cellCls+=' today';
    if (isSel)   cellCls+=' selected';

    let slotsHTML='';
    for (const slot of SLOTS) {
      const key=`${d}_${slot}`;
      const myX = editable && myData[key]==='X';
      const {grade}=getSlotInfo(d,slot);
      const blocked = isBlocked(d, slot);
      const gameDay = isGameDay(d, slot);
      const slotClick = (editable && !blocked) ? `onclick="doToggle(${d},'${slot}')"` : '';
      const bg = blocked ? '#f0efea'
        : myX ? '#fef0f0'
        : (showGrade && grade!=='none') ? GRADE_BG[grade]
        : 'transparent';
      const border = gameDay ? 'outline:2px solid #e24b4a;outline-offset:-2px;' : '';
      const labelStyle = blocked ? 'color:#a0a09a;' : myX ? 'color:#a32d2d;font-weight:700;' : '';
      const labelText  = blocked ? '✕ '+slot : myX ? '✕ '+slot : slot;
      slotsHTML+=`
        <div class="slot${(editable&&!blocked)?' clickable':''}" style="background:${bg};${border}" ${slotClick}>
          <span class="slot-label" style="${labelStyle}">${labelText}</span>
        </div>`;
    }

    cells+=`
      <div class="${cellCls}">
        <div class="day-header" onclick="doSelectDay(${d})"><span class="${numCls}">${d}</span></div>
        ${slotsHTML}
      </div>`;
  }
  return cells;
}

/* ── 날짜 상세 패널 ── */
function renderDayDetail(d) {
  const {year,month}=state;
  const date=new Date(year,month-1,d);
  const dow=DOW_KR[date.getDay()];
  let slotsHTML='';
  for (const slot of SLOTS) {
    const key=`${d}_${slot}`;
    const unavailList=MEMBERS.filter(m=>state.allData[m]?.[key]==='X');
    const notDoneList=MEMBERS.filter(m=>!isDone(m));
    const availList=MEMBERS.filter(m=>isDone(m)&&!unavailList.includes(m));

    const unavailChips = unavailList.map(m=>
      `<span class="chip chip-x"><span class="chip-dot" style="background:${COLORS[m]};"></span>${m}</span>`).join('');
    const notDoneChips = notDoneList.map(m=>
      `<span class="chip chip-none">${m}</span>`).join('');

    const adminBlocked = isBlocked(d, slot);
    slotsHTML+=`
      <div>
        <div class="detail-slot-title">${slot}</div>
        ${adminBlocked ? `<p class="detail-label" style="color:#a32d2d;font-weight:700;">불가(관리자 지정)</p>` : ''}
        ${!adminBlocked && unavailList.length ? `<p class="detail-label" style="color:#a32d2d;">불가</p><div class="member-chips" style="margin-bottom:6px;">${unavailChips}</div>` : ''}
        ${!adminBlocked && notDoneList.length ? `<p class="detail-label">미응답</p><div class="member-chips">${notDoneChips}</div>` : ''}
        ${!adminBlocked && !unavailList.length && !notDoneList.length ? `<p class="all-ok-msg">전원 가능</p>` : ''}
      </div>`;
  }
  return `
    <div class="day-detail">
      <div class="detail-header">
        <span class="detail-title">${month}월 ${d}일 (${dow})</span>
        <button class="detail-close" onclick="doSelectDay(${d})">×</button>
      </div>
      <div class="detail-slots">${slotsHTML}</div>
    </div>`;
}

/* ── 요약 ── */
function renderSummary() {
  const {year,month}=state;
  const total=daysIn(year,month);
  const byGrade={perfect:{점심:[],저녁:[]},good:{점심:[],저녁:[]},okay:{점심:[],저녁:[]}};
  for (let d=1;d<=total;d++) {
    for (const slot of SLOTS) {
      if (isBlocked(d, slot)) continue;
      const {grade}=getSlotInfo(d,slot);
      if (grade!=='none') byGrade[grade][slot].push(d);
    }
  }
  const fmt=(days,slot)=>!days.length?'':
    `<div class="summary-row"><span class="slot-tag">${slot}</span><span class="days">${days.map(d=>`${month}/${d}`).join(', ')}</span></div>`;
  let html='';
  for (const g of ['perfect','good','okay']) {
    const l=byGrade[g]['점심'],d2=byGrade[g]['저녁'];
    if (!l.length&&!d2.length) continue;
    html+=`<div class="card"><div class="summary-title"><div class="grade-badge" style="background:${GRADE_COLOR[g]};"></div>${GRADE_LABEL[g]}</div>${fmt(l,'점심')}${fmt(d2,'저녁')}</div>`;
  }
  return html || `<div class="card"><p class="summary-none">합주 가능한 날이 없어요</p></div>`;
}

      ${DOW_KR.map((d,i)=>`<div class="dow-cell ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">${renderCalGrid(true)}</div>

    ${detailHTML}

    <button class="submit-btn${submitted?' submitted':''}" onclick="doSubmit()" style="margin-bottom:5px;">
      ${submitted?'✓ 응답 완료됨 — 수정하려면 클릭':'응답 완료 표시하기'}
    </button>
    <p class="submit-hint">${submitted?'완료를 취소하면 집계에서 빠져요':'불가 날짜를 모두 체크한 후 완료 표시해 주세요'}</p>

    <div class="card">
      <p class="card-title">응답 현황</p>
      <div class="status-grid2">${statusRows}</div>
    </div>
    ${summarySection}
    <p class="hint">점심/저녁 칸 클릭 = 불가 표시 · 날짜 숫자 클릭 = 상세 현황<br>등급 점은 전원 완료 후 표시돼요</p>`;
}


/* ── 관리자 달력 ── */
function renderAdmin() {
  if (state.loading) return `<div class="loading">불러오는 중...</div>`;
  if (state.error)   return `<div class="error-msg">${state.error}</div>`;
  const {year,month} = state;
  const total=daysIn(year,month), first=firstDOW(year,month);
  const today=new Date();
  const todayD=today.getFullYear()===year&&today.getMonth()+1===month?today.getDate():-1;
  const showGrade=canShowGrade();
  const GRADE_BG={perfect:'#97c97a',good:'#dff5d0',okay:'#faeeda'};

  let cells='';
  for (let i=0;i<first;i++) cells+='<div></div>';

  for (let d=1;d<=total;d++) {
    const dow=(first+d-1)%7;
    const isToday=d===todayD;
    const isSel=state.selectedDay===d;
    const numCls=['day-num',isToday?'bold':'',dow===0?'sun':dow===6?'sat':''].filter(Boolean).join(' ');
    let cellCls='day-cell'; if(isToday) cellCls+=' today'; if(isSel) cellCls+=' selected';
    let slotsHTML='';
    for (const slot of SLOTS) {
      const {grade}=getSlotInfo(d,slot);
      const gameDay=isGameDay(d,slot);
      const blocked2=isBlocked(d,slot);
      const bg=blocked2?'#f0efea':(showGrade&&grade!=='none')?GRADE_BG[grade]:'transparent';
      const border=gameDay?'2px solid #e24b4a':'none';
      const adminLabel=gameDay?'✕ '+slot:blocked2?'✕ '+slot:slot;
      const adminStyle=gameDay?'color:#a32d2d;font-weight:700;':blocked2?'color:#a0a09a;font-weight:700;':'';
      slotsHTML+=`
        <div class="slot clickable" style="background:${bg};outline:${border};outline-offset:-2px;" onclick="doAdminToggle(${d},'${slot}')">
          <span class="slot-label" style="${adminStyle}">${adminLabel}</span>
        </div>`;
    }
    cells+=`
      <div class="${cellCls}">
        <div class="day-header" onclick="doSelectDay(${d})"><span class="${numCls}">${d}</span></div>
        ${slotsHTML}
      </div>`;
  }

  /* 지정된 합주일 목록 */
  const gameDays=[];
  for(let d=1;d<=total;d++){
    for(const slot of SLOTS){
      if(isGameDay(d,slot)) gameDays.push(`${month}/${d} ${slot}`);
    }
  }

  return `
    ${renderTabBar()}
    <div class="top-bar">
      <div class="user-badge">
        <span style="font-size:15px;font-weight:600;">관리자</span>
        <span class="live-badge"><span class="live-dot"></span>실시간</span>
      </div>
      <button onclick="doAdminLogout()">나가기</button>
    </div>

    <div class="month-nav">
      <button onclick="doMonth(-1)">◀</button>
      <span class="month-label">${year}년 ${month}월</span>
      <button onclick="doMonth(1)">▶</button>
    </div>

    <div class="legend">
      <div class="legend-item"><div style="width:14px;height:10px;border:2px solid #e24b4a;border-radius:2px;"></div>합주일 지정</div>
      <div class="legend-item"><div style="width:14px;height:10px;background:#f0efea;border:0.5px solid var(--border);border-radius:2px;"></div>전체 불가</div>
      <div class="legend-item"><div class="legend-dot" style="background:#97c97a;"></div>전원 가능</div>
      <div class="legend-item"><div class="legend-dot" style="background:#dff5d0;border:0.5px solid var(--border);"></div>가능</div>
      <div class="legend-item"><div class="legend-dot" style="background:#faeeda;border:0.5px solid var(--border);"></div>아쉽지만 가능</div>
    </div>

    <div class="dow-row">
      ${DOW_KR.map((d,i)=>`<div class="dow-cell ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">${cells}</div>

    <div class="card">
      <p class="card-title">지정된 합주일</p>
      ${gameDays.length
        ? `<p style="font-size:13px;color:var(--text);line-height:2;">${gameDays.join(' &nbsp;·&nbsp; ')}</p>`
        : `<p style="font-size:12px;color:var(--text3);">아직 지정된 합주일이 없어요</p>`}
    </div>
    <p class="hint">슬롯 클릭: 합주일(빨간 테두리) → 전체불가(회색) → 해제 · 날짜 숫자 클릭으로 상세 현황</p>`;
}


function renderTabBar() {
  return `<div class="tab-bar">
    <button class="tab-btn${state.tab==='schedule'?' active':''}" onclick="state.tab='schedule';render();">일정</button>
    <button class="tab-btn${state.tab==='setlist'?' active':''}" onclick="state.tab='setlist';render();">셋리스트</button>
  </div>`;
}
function render() {
  if (state.tab === 'setlist') {
    document.getElementById('app').innerHTML = renderSetlist();
    return;
  }
  document.getElementById('app').innerHTML = state.isAdmin ? renderAdmin() : (state.member ? renderCalendar() : renderLogin());
}

attachListener();
loadSetlistOrder();
</script>
</body>
</html>
