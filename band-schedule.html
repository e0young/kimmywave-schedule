<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>합주 일정 조율</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f8f8f6;
      --bg3: #f0efea;
      --text: #1c1c1a;
      --text2: #6b6b66;
      --text3: #a0a09a;
      --border: #e4e4de;
      --border2: #d0d0c8;
      --green-bg: #eaf3de;
      --green: #3b6d11;
      --green-border: #639922;
      --red-bg: #fef0f0;
      --red: #a32d2d;
      --radius: 10px;
      --radius-sm: 6px;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: var(--bg2);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 1.5rem 1rem 3rem;
    }

    #app { width: 100%; max-width: 460px; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .logo { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; }

    /* ── Button base ── */
    button {
      font-family: inherit;
      cursor: pointer;
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-size: 13px;
      transition: background 0.12s, border-color 0.12s;
    }
    button:hover { background: var(--bg3); border-color: var(--border2); }
    button:active { transform: scale(0.98); }

    /* ── Login screen ── */
    .login-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }
    .login-sub {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 1.5rem;
    }
    .member-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .member-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      background: var(--bg);
      text-align: left;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
    }
    .member-btn:hover { background: var(--bg3); border-color: var(--border2); transform: translateY(-1px); }
    .member-btn:active { transform: scale(0.98); }
    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
      flex-shrink: 0;
    }
    .member-name { font-size: 14px; color: var(--text); }

    /* ── Calendar top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .user-badge .avatar { width: 30px; height: 30px; font-size: 11px; }
    .user-name { font-size: 15px; font-weight: 600; }

    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .month-label { font-size: 15px; font-weight: 600; }
    .nav-btn { padding: 4px 14px; font-size: 14px; }

    /* ── Day-of-week header ── */
    .dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 4px;
    }
    .dow-cell {
      text-align: center;
      font-size: 11px;
      padding: 3px 0;
      color: var(--text2);
    }
    .dow-cell.sun { color: #e24b4a; }
    .dow-cell.sat { color: #378add; }

    /* ── Calendar grid ── */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 1rem;
    }
    .day-cell {
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 3px;
      min-height: 62px;
      cursor: pointer;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.1s, border-color 0.1s;
      user-select: none;
    }
    .day-cell:hover { border-color: var(--border2); background: var(--bg3); }
    .day-cell.status-ok  { background: var(--green-bg); }
    .day-cell.status-no  { background: var(--red-bg); }
    .day-cell.all-go     { background: var(--green-bg); border: 1.5px solid var(--green-border); }
    .day-cell.is-today   { outline: 2px solid #378add; outline-offset: 1px; }

    .day-num {
      font-size: 12px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 2px;
    }
    .day-num.today-num { font-weight: 700; }
    .day-num.sun-num   { color: #e24b4a; }
    .day-num.sat-num   { color: #378add; }

    .day-status {
      font-size: 9px;
      line-height: 1.3;
      text-align: center;
      min-height: 12px;
    }
    .day-status.ok { color: var(--green); }
    .day-status.no { color: var(--red); }

    .dot-row {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 3px;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .day-count {
      font-size: 9px;
      color: var(--text3);
      margin-top: 2px;
    }
    .day-count.full { color: var(--green); }

    /* ── Summary cards ── */
    .summary-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .summary-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .summary-val {
      font-size: 13px;
      color: var(--text2);
    }
    .summary-val.has-days { color: var(--green); font-weight: 500; }
    .near-title {
      font-size: 12px;
      font-weight: 600;
      margin: 8px 0 2px;
    }
    .near-val { font-size: 12px; color: var(--text2); }

    /* ── Member status grid ── */
    .status-grid {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .status-grid-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 8px;
    }
    .status-member-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .status-member {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-member-name { color: var(--text); }
    .status-member-count { color: var(--text2); }
    .status-member-none  { color: var(--text3); }

    .hint {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      line-height: 1.6;
      margin-top: 4px;
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text2);
      font-size: 14px;
    }

    /* ── Real-time badge ── */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--green);
      background: var(--green-bg);
      padding: 3px 8px;
      border-radius: 99px;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
/* ================================================================
   ★ Firebase 설정값 입력 (아래 7줄만 본인 프로젝트 값으로 교체)
   Firebase Console → 프로젝트 설정 → 내 앱 → SDK 설정 및 구성
   ================================================================ */
const firebaseConfig = {
  apiKey:            "AIzaSyClctoIM-AjWGcXo9q77neN0ubQIqI3nOI",
  authDomain:        "kimmywave-schedule.firebaseapp.com",
  databaseURL:       "https://kimmywave-schedule-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "kimmywave-schedule",
  storageBucket:     "kimmywave-schedule.firebasestorage.app",
  messagingSenderId: "55851759863",
  appId:             "1:55851759863:web:1e42b9d6196fbce6387bf2"
};
/* ================================================================ */

/* ── 멤버 목록 & 색상 ── */
const MEMBERS = ['보컬(박)','보컬(이)','기타(손)','기타(배)','베이스','건반','드럼(의)','드럼(현)'];
const COLORS = {
  '보컬(박)': '#7F77DD', '보컬(이)': '#D4537E',
  '기타(손)': '#378ADD', '기타(배)': '#1D9E75',
  '베이스':   '#D85A30', '건반':     '#BA7517',
  '드럼(의)': '#639922', '드럼(현)': '#888780'
};

/* ── Firebase 초기화 ── */
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ── 상태 ── */
let state = {
  member:   null,
  year:     new Date().getFullYear(),
  month:    new Date().getMonth() + 1,
  myData:   {},   // { "1": "O", "5": "X", ... }
  allData:  {},   // { "보컬(박)": { "1": "O", ... }, ... }
  listener: null,
  loading:  false
};

/* ── 유틸 ── */
function monthKey(y, m) { return `${y}-${String(m).padStart(2,'0')}`; }
function daysIn(y, m)   { return new Date(y, m, 0).getDate(); }
function firstDOW(y, m) { return new Date(y, m-1, 1).getDay(); }

/* ── Firebase 리스너 연결 ── */
function attachListener() {
  if (state.listener) state.listener.off();
  const ref = db.ref(`schedule/${monthKey(state.year, state.month)}`);
  ref.on('value', snap => {
    const data = snap.val() || {};
    state.allData = {};
    MEMBERS.forEach(m => { state.allData[m] = data[m] || {}; });
    if (state.member) state.myData = { ...state.allData[state.member] };
    render();
  });
  state.listener = ref;
}

/* ── 로그인 ── */
function doLogin(member) {
  state.member  = member;
  state.loading = true;
  render();
  attachListener();
}

/* ── 날짜 토글 ── */
function doToggle(d) {
  const key = String(d);
  const cur = state.myData[key];
  let next;
  if      (!cur)       next = 'O';
  else if (cur === 'O') next = 'X';
  else                  next = null;

  const ref = db.ref(`schedule/${monthKey(state.year, state.month)}/${state.member}/${key}`);
  if (next) ref.set(next);
  else      ref.remove();
}

/* ── 월 이동 ── */
function doMonth(delta) {
  if (state.listener) { state.listener.off(); state.listener = null; }
  let { year, month } = state;
  month += delta;
  if (month > 12) { year++; month = 1; }
  if (month < 1)  { year--; month = 12; }
  state.year = year; state.month = month;
  state.myData = {}; state.allData = {};
  state.loading = true;
  render();
  attachListener();
}

/* ── 로그아웃 ── */
function doLogout() {
  if (state.listener) { state.listener.off(); state.listener = null; }
  state.member  = null;
  state.myData  = {};
  state.allData = {};
  state.loading = false;
  render();
}

/* ── 렌더: 로그인 화면 ── */
function renderLogin() {
  return `
    <div class="header">
      <span class="logo">밴드 스케줄</span>
      <span class="live-badge"><span class="live-dot"></span>실시간 동기화</span>
    </div>
    <p class="login-title">합주 일정 조율</p>
    <p class="login-sub">내 파트를 선택하세요</p>
    <div class="member-grid">
      ${MEMBERS.map(m => `
        <button class="member-btn" onclick="doLogin('${m}')">
          <div class="avatar" style="background:${COLORS[m]}22; border: 1.5px solid ${COLORS[m]}; color:${COLORS[m]};">
            ${m[0]}
          </div>
          <span class="member-name">${m}</span>
        </button>
      `).join('')}
    </div>
  `;
}

/* ── 렌더: 달력 ── */
function renderCalendar() {
  if (state.loading) return `<div class="loading">불러오는 중...</div>`;

  const { year, month, member, myData, allData } = state;
  const total   = daysIn(year, month);
  const first   = firstDOW(year, month);
  const today   = new Date();
  const todayD  = today.getFullYear() === year && today.getMonth()+1 === month ? today.getDate() : -1;

  /* 전원 가능 / 거의 가능 계산 */
  const possibleDays = [], nearDays = [];
  for (let d = 1; d <= total; d++) {
    const key  = String(d);
    const oLen = MEMBERS.filter(m => allData[m]?.[key] === 'O').length;
    const xLen = MEMBERS.filter(m => allData[m]?.[key] === 'X').length;
    if (oLen === MEMBERS.length) possibleDays.push(d);
    else if (oLen === MEMBERS.length - 1 && xLen === 0) nearDays.push(d);
  }

  /* 달력 셀 */
  let cells = '';
  for (let i = 0; i < first; i++) cells += '<div></div>';

  for (let d = 1; d <= total; d++) {
    const key   = String(d);
    const myS   = myData[key];
    const oList = MEMBERS.filter(m => allData[m]?.[key] === 'O');
    const xList = MEMBERS.filter(m => allData[m]?.[key] === 'X');
    const allGo = oList.length === MEMBERS.length;
    const dow   = (first + d - 1) % 7;

    let cls = 'day-cell';
    if (allGo)      cls += ' all-go';
    else if (myS === 'O') cls += ' status-ok';
    else if (myS === 'X') cls += ' status-no';
    if (d === todayD) cls += ' is-today';

    const numCls = ['day-num',
      d === todayD ? 'today-num' : '',
      dow === 0 ? 'sun-num' : dow === 6 ? 'sat-num' : ''
    ].filter(Boolean).join(' ');

    const dots = MEMBERS
      .filter(m => m !== member && allData[m]?.[key])
      .map(m => `<div class="dot" style="background:${allData[m][key]==='O' ? COLORS[m] : '#E24B4A'};"></div>`)
      .join('');

    const answered = oList.length + xList.length;
    const countCls = allGo ? 'day-count full' : 'day-count';

    cells += `
      <div class="${cls}" onclick="doToggle(${d})">
        <span class="${numCls}">${d}</span>
        <span class="day-status ${myS==='O'?'ok':myS==='X'?'no':''}">
          ${myS==='O'?'가능':myS==='X'?'불가':''}
        </span>
        <div class="dot-row">${dots}</div>
        ${answered > 0 ? `<span class="${countCls}">${oList.length}/${MEMBERS.length}</span>` : ''}
      </div>`;
  }

  const fmt  = days => days.map(d => `${month}/${d}`).join(', ');
  const rowsHTML = MEMBERS.filter(m => m !== member).map(m => {
    const ans = Object.keys(allData[m] || {}).length;
    const oC  = Object.values(allData[m] || {}).filter(v => v === 'O').length;
    return `
      <div class="status-member">
        <div class="status-dot" style="background:${ans ? COLORS[m] : '#d0d0c8'};"></div>
        <span class="status-member-name">${m}</span>
        ${ans
          ? `<span class="status-member-count">${oC}일</span>`
          : `<span class="status-member-none">미응답</span>`}
      </div>`;
  }).join('');

  return `
    <div class="top-bar">
      <div class="user-badge">
        <div class="avatar" style="background:${COLORS[member]}22; border:1.5px solid ${COLORS[member]}; color:${COLORS[member]};">
          ${member[0]}
        </div>
        <span class="user-name">${member}</span>
        <span class="live-badge"><span class="live-dot"></span>실시간</span>
      </div>
      <button onclick="doLogout()">로그아웃</button>
    </div>

    <div class="month-nav">
      <button class="nav-btn" onclick="doMonth(-1)">◀</button>
      <span class="month-label">${year}년 ${month}월</span>
      <button class="nav-btn" onclick="doMonth(1)">▶</button>
    </div>

    <div class="dow-row">
      ${['일','월','화','수','목','금','토'].map((d,i) =>
        `<div class="dow-cell ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">${cells}</div>

    <div class="summary-card">
      <p class="summary-title">전원 가능한 날 (${possibleDays.length}일)</p>
      <p class="summary-val ${possibleDays.length?'has-days':''}">
        ${possibleDays.length ? fmt(possibleDays) : '아직 없음'}
      </p>
      ${nearDays.length ? `
        <p class="near-title">1명 미응답 날 (${nearDays.length}일)</p>
        <p class="near-val">${fmt(nearDays)}</p>
      ` : ''}
    </div>

    <div class="status-grid">
      <p class="status-grid-title">이번 달 응답 현황</p>
      <div class="status-member-grid">${rowsHTML}</div>
    </div>

    <p class="hint">날짜 클릭: 미응답 → 가능(초록) → 불가(빨강) 순으로 변경<br>다른 멤버 응답은 작은 점으로 표시됩니다</p>
  `;
}

/* ── 메인 렌더 ── */
function render() {
  document.getElementById('app').innerHTML =
    state.member ? renderCalendar() : renderLogin();
}

render();
</script>
</body>
</html>
