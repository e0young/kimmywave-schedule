<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>합주 일정 조율</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f8f8f6; --bg3: #f0efea;
      --text: #1c1c1a; --text2: #6b6b66; --text3: #a0a09a;
      --border: #e4e4de; --border2: #d0d0c8;
      --r: 10px; --rs: 6px;
    }
    body {
      font-family: 'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
      background: var(--bg2); color: var(--text);
      min-height: 100vh; display: flex; justify-content: center;
      padding: 1.5rem 1rem 3rem;
    }
    #app { width: 100%; max-width: 500px; }
    button { font-family: inherit; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); border-radius: var(--rs); padding: 6px 14px; font-size: 13px; transition: background .12s; }
    button:hover { background: var(--bg3); }
    button:active { transform: scale(0.98); }

    /* ── 공통 ── */
    .live-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: #3b6d11; background: #eaf3de; padding: 3px 8px; border-radius: 99px; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #3b6d11; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r); padding: 12px 14px; margin-bottom: 10px; }
    .card-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }

    /* ── 로그인 ── */
    .login-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; letter-spacing: -.02em; }
    .login-sub { font-size: 14px; color: var(--text2); margin-bottom: 1.25rem; }
    .member-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
    .member-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: var(--r);
      border: 0.5px solid var(--border); background: var(--bg);
      cursor: pointer; transition: background .12s, transform .1s;
      position: relative;
    }
    .member-btn:hover { background: var(--bg3); transform: translateY(-1px); }
    .member-btn .done-check {
      position: absolute; top: 6px; right: 8px;
      font-size: 10px; color: #3b6d11; font-weight: 700;
    }
    .member-name { font-size: 14px; }
    .member-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }

    /* ── 상단 바 ── */
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .user-badge { display: flex; align-items: center; gap: 8px; }
    .user-name { font-size: 15px; font-weight: 600; }
    .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .month-label { font-size: 15px; font-weight: 600; }

    /* ── 달력 ── */
    .dow-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 4px; }
    .dow-cell { text-align: center; font-size: 11px; padding: 3px 0; color: var(--text2); }
    .dow-cell.sun { color: #e24b4a; }
    .dow-cell.sat { color: #378add; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 1rem; }
    .day-cell { border: 0.5px solid var(--border); border-radius: var(--rs); overflow: hidden; display: flex; flex-direction: column; min-height: 74px; }
    .day-cell.today { outline: 2px solid #378add; outline-offset: 1px; }
    .day-header { padding: 3px 4px 2px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; }
    .day-num { font-size: 11px; font-weight: 400; color: var(--text); }
    .day-num.bold { font-weight: 700; }
    .day-num.sun { color: #e24b4a; }
    .day-num.sat { color: #378add; }
    .slot { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2px; cursor: pointer; transition: background .1s; position: relative; }
    .slot:first-of-type { border-bottom: 0.5px solid var(--border); }
    .slot:hover { filter: brightness(0.93); }
    .slot.unavail { background: #fef0f0; }
    .slot-label { font-size: 9px; color: var(--text3); line-height: 1; margin-bottom: 2px; }
    .slot.unavail .slot-label { color: #a32d2d; font-weight: 700; }
    .dot-row { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
    .dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
    .grade-pip { position: absolute; top: 2px; right: 2px; width: 5px; height: 5px; border-radius: 50%; }
    .grade-pip.perfect { background: #3b6d11; }
    .grade-pip.good    { background: #639922; }
    .grade-pip.okay    { background: #BA7517; }

    /* ── 제출 버튼 ── */
    .submit-area { margin-bottom: 10px; }
    .submit-btn {
      width: 100%; padding: 12px; font-size: 14px; font-weight: 600;
      border-radius: var(--r); cursor: pointer; transition: background .15s;
      border: 1.5px solid #639922; color: #3b6d11; background: #eaf3de;
    }
    .submit-btn:hover { background: #d4ecc0; }
    .submit-btn.submitted {
      border-color: #3b6d11; background: #3b6d11; color: white;
    }
    .submit-btn.submitted:hover { background: #2d5a0d; }
    .submit-hint { font-size: 11px; color: var(--text3); text-align: center; margin-top: 5px; }

    /* ── 요약 ── */
    .summary-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .grade-badge { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .summary-row { display: flex; gap: 8px; font-size: 12px; margin-bottom: 4px; align-items: flex-start; }
    .slot-tag { font-size: 10px; background: var(--bg3); padding: 1px 6px; border-radius: 3px; color: var(--text2); flex-shrink: 0; margin-top: 1px; }
    .days { color: var(--text); line-height: 1.5; }
    .summary-none { font-size: 12px; color: var(--text3); }
    .waiting-msg { font-size: 13px; color: var(--text2); text-align: center; padding: 1rem 0; }
    .waiting-count { font-size: 22px; font-weight: 700; color: var(--text); display: block; margin-bottom: 4px; }

    /* ── 응답 현황 ── */
    .status-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .status-row { display: flex; align-items: center; gap: 6px; font-size: 11px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── 범례 ── */
    .legend { display: flex; gap: 10px; flex-wrap: wrap; font-size: 11px; color: var(--text2); margin-bottom: 10px; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    .hint { font-size: 11px; color: var(--text3); text-align: center; line-height: 1.7; margin-top: 4px; }
    .loading { text-align: center; padding: 3rem; color: var(--text2); font-size: 14px; }
    .error-msg { text-align: center; padding: 2rem; color: #a32d2d; font-size: 13px; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const firebaseConfig = {
  apiKey:            "AIzaSyClctoIM-AjWGcXo9q77neN0ubQIqI3nOI",
  authDomain:        "kimmywave-schedule.firebaseapp.com",
  databaseURL:       "https://kimmywave-schedule-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "kimmywave-schedule",
  storageBucket:     "kimmywave-schedule.firebasestorage.app",
  messagingSenderId: "55851759863",
  appId:             "1:55851759863:web:1e42b9d6196fbce6387bf2"
};

const MEMBERS = ['보컬(박)','보컬(이)','기타(손)','기타(배)','베이스','건반','드럼(의)','드럼(현)'];
const COLORS  = {
  '보컬(박)':'#7F77DD','보컬(이)':'#D4537E','기타(손)':'#378ADD','기타(배)':'#1D9E75',
  '베이스':'#D85A30','건반':'#BA7517','드럼(의)':'#639922','드럼(현)':'#888780'
};
const SLOTS = ['점심','저녁'];
const GRADE_LABEL = { perfect:'전원 가능', good:'가능', okay:'아쉽지만 가능' };
const GRADE_COLOR = { perfect:'#3b6d11', good:'#639922', okay:'#BA7517' };

function calcGrade(availSet) {
  const hasVocal   = ['보컬(박)','보컬(이)'].some(m => availSet.has(m));
  const hasDrum    = ['드럼(의)','드럼(현)'].some(m => availSet.has(m));
  const hasGuitarS = availSet.has('기타(손)');
  const hasKeybd   = availSet.has('건반');
  const hasGuitarB = availSet.has('기타(배)');
  const hasBass    = availSet.has('베이스');
  if (!hasGuitarS || !hasKeybd) return 'none';
  if (!hasGuitarB && !hasBass) return 'none';
  if (!hasVocal || !hasDrum) return 'none';
  if (availSet.size === MEMBERS.length) return 'perfect';
  if (hasGuitarB && hasBass) return 'good';
  return 'okay';
}

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let state = {
  member: null,
  year:  new Date().getFullYear(),
  month: new Date().getMonth() + 1,
  myData:  {},
  allData: {},
  listener: null,
  loading: true,
  error: null
};

function monthKey(y,m){ return `${y}-${String(m).padStart(2,'0')}`; }
function daysIn(y,m)  { return new Date(y,m,0).getDate(); }
function firstDOW(y,m){ return new Date(y,m-1,1).getDay(); }

/* 응답 완료 여부 */
function isDone(m)   { return state.allData[m]?.['_done'] === 'Y'; }
function allDone()   { return MEMBERS.every(m => isDone(m)); }
function doneCount() { return MEMBERS.filter(m => isDone(m)).length; }

/* X 날짜 수 (제출 여부와 무관하게) */
function xCount(m) {
  return Object.entries(state.allData[m] || {})
    .filter(([k,v]) => k !== '_done' && v === 'X').length;
}

function attachListener() {
  if (state.listener) { state.listener.off(); state.listener = null; }
  const ref = db.ref(`schedule/${monthKey(state.year, state.month)}`);
  const tid = setTimeout(() => {
    if (state.loading) { state.loading=false; state.error='Firebase 연결 실패. 새로고침 해보세요.'; render(); }
  }, 8000);
  ref.on('value', snap => {
    clearTimeout(tid); state.error = null;
    const data = snap.val() || {};
    state.allData = {};
    MEMBERS.forEach(m => { state.allData[m] = data[m] || {}; });
    if (state.member) state.myData = { ...state.allData[state.member] };
    state.loading = false;
    render();
  }, err => {
    clearTimeout(tid); state.loading=false;
    state.error='오류: ' + err.message; render();
  });
  state.listener = ref;
}

function doLogin(m) {
  state.member = m;
  state.myData = { ...state.allData[m] };
  render();
}

function doLogout() {
  state.member = null; state.myData = {}; render();
}

function doToggle(d, slot) {
  const key = `${d}_${slot}`;
  const ref = db.ref(`schedule/${monthKey(state.year,state.month)}/${state.member}/${key}`);
  if (state.myData[key] === 'X') { delete state.myData[key]; ref.remove(); }
  else                            { state.myData[key] = 'X';  ref.set('X'); }
  state.allData[state.member] = { ...state.myData };
  render();
}

function doSubmit() {
  const ref = db.ref(`schedule/${monthKey(state.year,state.month)}/${state.member}/_done`);
  if (isDone(state.member)) {
    delete state.myData['_done'];
    state.allData[state.member]['_done'] = undefined;
    ref.remove();
  } else {
    state.myData['_done'] = 'Y';
    state.allData[state.member]['_done'] = 'Y';
    ref.set('Y');
  }
  render();
}

function doMonth(delta) {
  if (state.listener) { state.listener.off(); state.listener = null; }
  let {year,month} = state;
  month += delta;
  if (month > 12) { year++; month = 1; }
  if (month < 1)  { year--; month = 12; }
  state.year=year; state.month=month;
  state.myData={}; state.allData={}; state.loading=true;
  render(); attachListener();
}

function getSlotInfo(d, slot) {
  const key = `${d}_${slot}`;
  const unavail = new Set(MEMBERS.filter(m => state.allData[m]?.[key] === 'X'));
  const avail   = new Set(MEMBERS.filter(m => !unavail.has(m)));
  return { unavail, avail, grade: calcGrade(avail) };
}

/* ── 로그인 화면 ── */
function renderLogin() {
  if (state.loading) return `<div class="loading">불러오는 중...</div>`;
  if (state.error)   return `<div class="error-msg">${state.error}</div>`;

  const done = doneCount();
  const total = MEMBERS.length;

  const memberBtns = MEMBERS.map(m => {
    const submitted = isDone(m);
    const xCnt = xCount(m);
    return `
      <button class="member-btn" onclick="doLogin('${m}')">
        <div class="avatar" style="width:32px;height:32px;font-size:11px;background:${COLORS[m]}22;border:1.5px solid ${COLORS[m]};color:${COLORS[m]};">${m[0]}</div>
        <div>
          <div class="member-name">${m}</div>
          <div class="member-sub">${submitted ? '✓ 완료' : xCnt > 0 ? `${xCnt}개 불가 입력` : '미응답'}</div>
        </div>
        ${submitted ? '<span class="done-check">완료</span>' : ''}
      </button>`;
  }).join('');

  /* 전원 완료 시 요약 표시 */
  let summaryHTML = '';
  if (allDone()) {
    summaryHTML = renderSummary();
  } else {
    summaryHTML = `
      <div class="card" style="text-align:center;padding:1rem 14px;">
        <span class="waiting-count">${done} / ${total}</span>
        <span style="font-size:13px;color:var(--text2);">명 응답 완료</span>
        <p style="font-size:11px;color:var(--text3);margin-top:8px;">전원 완료 후 가능 날짜가 표시돼요</p>
      </div>`;
  }

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
      <span style="font-size:13px;font-weight:600;letter-spacing:.08em;color:var(--text3);">밴드 스케줄</span>
      <span class="live-badge"><span class="live-dot"></span>실시간 동기화</span>
    </div>
    <p class="login-title">합주 일정 조율</p>
    <p class="login-sub" style="margin-bottom:.75rem;">${state.year}년 ${state.month}월 · 파트를 선택하세요</p>
    <div class="member-grid">${memberBtns}</div>
    ${summaryHTML}`;
}

/* ── 요약 섹션 (로그인/캘린더 공용) ── */
function renderSummary() {
  const {year, month} = state;
  const total = daysIn(year, month);
  const byGrade = { perfect:{점심:[],저녁:[]}, good:{점심:[],저녁:[]}, okay:{점심:[],저녁:[]} };
  for (let d=1; d<=total; d++) {
    for (const slot of SLOTS) {
      const {grade} = getSlotInfo(d, slot);
      if (grade !== 'none') byGrade[grade][slot].push(d);
    }
  }
  const fmt = (days, slot) => !days.length ? '' : `
    <div class="summary-row">
      <span class="slot-tag">${slot}</span>
      <span class="days">${days.map(d=>`${month}/${d}`).join(', ')}</span>
    </div>`;
  let html = '';
  for (const g of ['perfect','good','okay']) {
    const l=byGrade[g]['점심'], d2=byGrade[g]['저녁'];
    if (!l.length && !d2.length) continue;
    html += `
      <div class="card">
        <div class="summary-title">
          <div class="grade-badge" style="background:${GRADE_COLOR[g]};"></div>
          ${GRADE_LABEL[g]}
        </div>
        ${fmt(l,'점심')}${fmt(d2,'저녁')}
      </div>`;
  }
  if (!html) html = `<div class="card"><p class="summary-none">합주 가능한 날이 없어요</p></div>`;
  return html;
}

/* ── 달력 화면 ── */
function renderCalendar() {
  if (state.loading) return `<div class="loading">불러오는 중...</div>`;
  if (state.error)   return `<div class="error-msg">${state.error}</div>`;

  const {year, month, member, myData} = state;
  const total=daysIn(year,month), first=firstDOW(year,month);
  const today=new Date();
  const todayD = today.getFullYear()===year && today.getMonth()+1===month ? today.getDate() : -1;
  const submitted = isDone(member);
  const all = allDone();

  let cells = '';
  for (let i=0; i<first; i++) cells += '<div></div>';

  for (let d=1; d<=total; d++) {
    const dow = (first+d-1)%7;
    const isToday = d===todayD;
    const numCls = ['day-num', isToday?'bold':'', dow===0?'sun':dow===6?'sat':''].filter(Boolean).join(' ');
    let slotsHTML = '';
    for (const slot of SLOTS) {
      const key = `${d}_${slot}`;
      const myX = myData[key] === 'X';
      const {unavail, grade} = getSlotInfo(d, slot);
      const otherDots = MEMBERS
        .filter(m => m!==member && unavail.has(m))
        .map(m => `<div class="dot" style="background:${COLORS[m]};"></div>`)
        .join('');
      const pip = (all && !myX && grade!=='none')
        ? `<div class="grade-pip ${grade}"></div>` : '';
      slotsHTML += `
        <div class="slot${myX?' unavail':''}" onclick="doToggle(${d},'${slot}')">
          ${pip}
          <span class="slot-label">${myX?'✕ '+slot:slot}</span>
          <div class="dot-row">${otherDots}</div>
        </div>`;
    }
    cells += `
      <div class="day-cell${isToday?' today':''}">
        <div class="day-header"><span class="${numCls}">${d}</span></div>
        ${slotsHTML}
      </div>`;
  }

  /* 응답 현황 */
  const statusRows = MEMBERS.filter(m=>m!==member).map(m => {
    const done2 = isDone(m);
    const xCnt = xCount(m);
    return `<div class="status-row">
      <div class="status-dot" style="background:${done2?COLORS[m]:'var(--border2)'};"></div>
      <span style="color:${done2?'var(--text)':'var(--text3)'};">${m}</span>
      <span style="color:var(--text2);margin-left:auto;">${done2?'완료':'미완료'}</span>
    </div>`;
  }).join('');

  /* 요약 or 대기 메시지 */
  const summarySection = all
    ? renderSummary()
    : `<div class="card" style="text-align:center;padding:1rem 14px;">
        <span class="waiting-count">${doneCount()} / ${MEMBERS.length}</span>
        <span style="font-size:13px;color:var(--text2);">명 응답 완료</span>
        <p style="font-size:11px;color:var(--text3);margin-top:8px;">전원 완료 후 가능 날짜가 표시돼요</p>
      </div>`;

  return `
    <div class="top-bar">
      <div class="user-badge">
        <div class="avatar" style="width:30px;height:30px;font-size:11px;background:${COLORS[member]}22;border:1.5px solid ${COLORS[member]};color:${COLORS[member]};">${member[0]}</div>
        <span class="user-name">${member}</span>
        <span class="live-badge"><span class="live-dot"></span>실시간</span>
      </div>
      <button onclick="doLogout()">로그아웃</button>
    </div>

    <div class="month-nav">
      <button onclick="doMonth(-1)">◀</button>
      <span class="month-label">${year}년 ${month}월</span>
      <button onclick="doMonth(1)">▶</button>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#3b6d11;"></div>전원 가능</div>
      <div class="legend-item"><div class="legend-dot" style="background:#639922;"></div>가능</div>
      <div class="legend-item"><div class="legend-dot" style="background:#BA7517;"></div>아쉽지만 가능</div>
      <div class="legend-item"><div style="width:14px;height:10px;background:#fef0f0;border:0.5px solid #e4e4de;border-radius:2px;"></div>불가 표시</div>
    </div>

    <div class="dow-row">
      ${['일','월','화','수','목','금','토'].map((d,i)=>`<div class="dow-cell ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">${cells}</div>

    <div class="submit-area">
      <button class="submit-btn${submitted?' submitted':''}" onclick="doSubmit()">
        ${submitted ? '✓ 응답 완료됨 — 수정하려면 클릭' : '응답 완료 표시하기'}
      </button>
      <p class="submit-hint">${submitted ? '완료를 취소하면 가능 날짜 집계에서 빠져요' : '불가 날짜를 모두 체크한 후 완료 표시해 주세요'}</p>
    </div>

    <div class="card">
      <p class="card-title">응답 현황</p>
      <div class="status-grid2">${statusRows}</div>
    </div>

    ${summarySection}

    <p class="hint">점심/저녁 칸 클릭 = 불가 표시 · 다시 클릭하면 해제<br>등급 점은 전원 완료 후 표시돼요</p>`;
}

function render() {
  document.getElementById('app').innerHTML = state.member ? renderCalendar() : renderLogin();
}

/* 앱 시작 시 바로 Firebase 연결 */
attachListener();
</script>
</body>
</html>
